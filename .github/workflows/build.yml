name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Oxlint (Vue/TS)
        run: pnpm lint

      - name: Clippy (Rust)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: windows-latest
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Linux dependencies (aarch64 cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu patchelf
          sudo apt-get install -y libwebkit2gtk-4.1-dev:arm64 libappindicator3-dev:arm64 librsvg2-dev:arm64

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Set build timestamp
        id: build_time
        shell: bash
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FRESCO_BUILD_TIME: ${{ steps.build_time.outputs.value }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_SYSROOT_DIR: /usr/aarch64-linux-gnu
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
        with:
          # Skip AppImage for Linux ARM64 cross-compile: the bundler is an ARM64 binary
          # that can't execute on the x86_64 runner (ENOEXEC)
          args: >-
            --target ${{ matrix.target }}
            ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '--bundles deb,rpm' || '' }}

      - name: Upload portable (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: fresco-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

      - name: Upload portable (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: fresco-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

      - name: Upload portable (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: fresco-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app

      - name: Upload portable (Windows)
        if: startsWith(matrix.platform, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: fresco-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/fresco.exe

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Linux x86_64
          cp artifacts/fresco-x86_64-unknown-linux-gnu/*.AppImage release/ 2>/dev/null || true
          cp artifacts/fresco-x86_64-unknown-linux-gnu/*.deb release/ 2>/dev/null || true
          # Linux ARM64
          for f in artifacts/fresco-aarch64-unknown-linux-gnu/*.deb; do
            [ -f "$f" ] && cp "$f" "release/$(basename "${f%.deb}")-arm64.deb" || true
          done
          # macOS
          cd artifacts/fresco-aarch64-apple-darwin && zip -r ../../release/Fresco-aarch64-apple-darwin.app.zip *.app && cd ../..
          cd artifacts/fresco-x86_64-apple-darwin && zip -r ../../release/Fresco-x86_64-apple-darwin.app.zip *.app && cd ../..
          # Windows
          cp artifacts/fresco-x86_64-pc-windows-msvc/fresco.exe release/Fresco-x86_64-pc-windows-msvc.exe
          cp artifacts/fresco-aarch64-pc-windows-msvc/fresco.exe release/Fresco-aarch64-pc-windows-msvc.exe 2>/dev/null || true

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --yes --cleanup-tag || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest release/* \
            --title "Release $(date -u +'%Y-%m-%d %H:%M UTC')" \
            --notes "" \
            --latest
